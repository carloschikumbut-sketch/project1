<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | SNEAKERLAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-black font-body">

    <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black italic tracking-tighter uppercase">SNEAKER<span class="text-red-600">LAB</span></h1>
            </div>

            <div id="auth-tabs" class="flex border-b border-zinc-200 mb-8">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-4 font-black tracking-widest text-xs border-b-2 border-black transition-all">SIGN IN</button>
                <button id="tab-register" onclick="switchTab('register')" class="flex-1 pb-4 font-black tracking-widest text-xs text-zinc-400 transition-all">REGISTER</button>
            </div>

            <form id="login-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Email Address</label>
                    <input type="email" placeholder="Enter your email" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:outline-none focus:border-black transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:outline-none focus:border-black transition-all">
                </div>
                <button type="submit" class="w-full bg-black text-white p-5 rounded-2xl font-black text-xs tracking-widest uppercase hover:bg-zinc-800 transition-all">Sign In</button>
            </form>

            <form id="register-form" class="hidden space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Full Name</label>
                    <input type="text" placeholder="John Doe" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:outline-none focus:border-black transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@email.com" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:outline-none focus:border-black transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Password</label>
                    <input type="password" placeholder="Create a password" class="w-full p-4 bg-zinc-50 border border-zinc-100 rounded-2xl focus:outline-none focus:border-black transition-all">
                </div>
                <button type="submit" class="w-full bg-red-600 text-white p-5 rounded-2xl font-black text-xs tracking-widest uppercase hover:bg-red-700 transition-all">
                    Create Account
                </button>
            </form>
            
            <div id="verify-section" class="hidden animate-fadeIn text-center">
                <div class="mb-6">
                    <i class="fa-solid fa-envelope-open-text text-4xl text-red-600 mb-4"></i>
                    <h2 class="text-xl font-black uppercase italic">Check Your Inbox</h2>
                    <p class="text-xs text-zinc-500 mt-2">We sent a 6-digit code to verify your account.</p>
                </div>

                <div class="mb-8">
                    <input type="text" 
                           id="otp-input" 
                           placeholder="0 0 0 0 0 0" 
                           maxlength="6" 
                           class="w-full bg-zinc-50 border border-zinc-100 p-5 rounded-2xl text-center text-2xl font-black tracking-[12px] focus:border-black focus:outline-none transition-all">
                </div>

                <button onclick="verifyMyCode()" class="w-full bg-black text-white p-5 rounded-2xl font-black text-xs tracking-widest uppercase hover:bg-zinc-800 transition-all">
                    Verify & Finish
                </button>
                
                <button onclick="location.reload()" class="mt-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest hover:text-black">
                    Entered wrong email? Go back
                </button>
            </div>

            <div class="mt-8">
                <div class="relative flex py-5 items-center">
                    <div class="flex-grow border-t border-zinc-200"></div>
                    <span class="flex-shrink mx-4 text-[10px] font-bold text-zinc-400 uppercase">Or Continue With</span>
                    <div class="flex-grow border-t border-zinc-200"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center p-4 border border-zinc-100 rounded-2xl hover:bg-zinc-50 transition-all"><i class="fa-brands fa-google mr-2"></i> <span class="text-xs font-bold">Google</span></button>
                    <button class="flex items-center justify-center p-4 border border-zinc-100 rounded-2xl hover:bg-zinc-50 transition-all"><i class="fa-brands fa-apple mr-2 text-lg"></i> <span class="text-xs font-bold">Apple</span></button>
                </div>
            </div>
            
            <p class="text-center mt-8 text-[11px] text-zinc-400 font-medium">By continuing, you agree to our <a href="#" class="text-black underline">Terms of Service</a>.</p>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            
            // Toggle Tab Styles
            const loginBtn = document.getElementById('tab-login');
            const regBtn = document.getElementById('tab-register');

            loginBtn.className = isLogin 
                ? "flex-1 pb-4 font-black tracking-widest text-xs border-b-2 border-black transition-all text-black" 
                : "flex-1 pb-4 font-black tracking-widest text-xs text-zinc-400 transition-all";
            
            regBtn.className = !isLogin 
                ? "flex-1 pb-4 font-black tracking-widest text-xs border-b-2 border-black transition-all text-black" 
                : "flex-1 pb-4 font-black tracking-widest text-xs text-zinc-400 transition-all";
        }
    </script>
    <script src="js/main.js"></script>
</body>
</html>
