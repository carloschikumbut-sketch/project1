<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEAKERLAB Admin | Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-style.css">
    <style>
        .form-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #202223; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 10px; border: 1px solid #bbb; border-radius: 4px; box-sizing: border-box;
        }
        .variant-table { width: 100%; border-collapse: collapse; background: #fff; }
        .variant-table td { padding: 10px; border-top: 1px solid #f1f1f1; }
        .media-upload { border: 2px dashed #008060; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; color: #008060; }
    </style>
</head>
<body>

   <nav class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-sneaker"></i> SNEAKER<span>LAB</span></div>
    <div class="nav-links">
        <a href="admin.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
        <a href="inventory.html" class="nav-item active"><i class="fa-solid fa-box"></i> Products</a>
        <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
        <a href="customers.html" class="nav-item"><i class="fa-solid fa-users"></i> Customers</a>
        <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        <div class="nav-divider"></div>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-eye"></i> View Store</a>
    </div>
</nav>
<main class="main-content">
        <form id="inventory-form">
            <header class="admin-header">
                <h1>Add Product</h1>
                <div class="admin-actions">
                    <button type="submit" class="btn-primary">Save Product</button>
                </div>
<div class="admin-actions">
    <button type="button" id="bulk-edit-btn" class="btn-secondary" onclick="toggleBulkEdit()">Bulk Edit Stock</button>
</div>

            </header>

            <div class="form-section">
                <div class="left-col">
                    <div class="card input-group">
                        <label>Title</label>
                        <input type="text" id="prod-title" placeholder="e.g. Air Jordan 4 Retro 'Military Blue'" required>
                        <label style="margin-top:15px;">Description</label>
                        <textarea id="prod-desc" rows="6" placeholder="Describe materials and style..."></textarea>
                    </div>

                   <div class="card">
    <label>Media (Product Image)</label>
    <div class="media-upload" onclick="document.getElementById('prod-img-file').click()">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
        <span>Click to upload image from computer</span>
        <input type="file" id="prod-img-file" accept="image/*" style="display: none;" onchange="updateFileName(this)">
    </div>
    <small id="file-name-display" style="display: block; margin-top: 10px; color: #008060; font-weight: bold;"></small>
</div>

                    <div class="card" style="margin-top:20px;">
                        <label>Variants (Sizes & Stock)</label>
                        <table class="variant-table" id="variant-list"></table>
                        <button type="button" class="btn-secondary" onclick="addNewVariant()" style="margin-top:15px;">+ Add size variant</button>
                    </div>
                </div>

                <div class="right-col">
                    <div class="card">
                        <label>Product Status</label>
                        <select id="prod-status">
                            <option value="active">Active</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>

                 
                    <div class="form-group">
    <label>Current Selling Price ($)</label>
    <input type="number" id="prod-price" step="0.01" required>
</div>

<div class="form-group">
    <label>Was Price / MSRP ($) - <small>Optional for Sales</small></label>
    <input type="number" id="prod-compare-price" step="0.01" placeholder="e.g., 150">
</div>

                    <div class="card" style="margin-top:20px;">
    <label>Organization</label>
    <small>Categories (Hold Ctrl/Cmd to select multiple)</small>
    <select id="prod-cat" multiple style="height: 100px; margin-bottom: 10px;">
        <option value="latest">Latest Arrivals</option>
        <option value="trending">Trending</option>
        <option value="sneakers">Sneakers</option>
        <option value="hoodies">Hoodies</option>
        <option value="slides">Slides</option>
    </select>
    
    <small style="margin-top:10px; display:block;">Brand</small>
    <input type="text" id="prod-brand" placeholder="e.g. Jordan">
</div>
        </form>

        <div class="card" style="margin-top: 30px;">
            <label>Current Inventory</label>
            <table class="variant-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="inventory-list-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/admin-dashboard.js"></script>


    <script>
        // Keeping this small helper here for the UI
        function addNewVariant() {
            const table = document.getElementById('variant-list');
            const row = table.insertRow();
            row.innerHTML = `
                <td><input type="text" placeholder="Size" class="v-size"></td>
                <td><input type="number" placeholder="Stock" class="v-stock"></td>
                <td><button type="button" onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none;"><i class="fa-solid fa-trash"></i></button></td>
            `;
        }
        function updateFileName(input) {
    const display = document.getElementById('file-name-display');
    display.innerText = input.files[0] ? "Selected: " + input.files[0].name : "";
}
    </script>

</body>
