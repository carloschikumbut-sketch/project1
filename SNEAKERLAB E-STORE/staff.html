<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SNEAKERLAB Admin | Staff Permissions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-style.css">
    <style>
        .permission-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .role-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .role-admin { background: #d3f9d8; color: #008060; }
        .role-staff { background: #e7f3ff; color: #007ace; }
    </style>
</head>
<body>
    <main class="main-content" style="margin-left:240px">
        <header class="admin-header">
            <h1>Staff Permissions</h1>
            <button class="btn-primary">+ Add Staff Member</button>
        </header>

        <div class="card">
            <h3>Active Staff Members</h3>
            <div class="permission-card">
                <div>
                    <strong>John Doe</strong><br>
                    <small>john@sneakerlab.com</small>
                </div>
                <span class="role-tag role-admin">Full Admin</span>
                <button style="border:none; color: #6d7175;">Edit Permissions</button>
            </div>
            <div class="permission-card">
                <div>
                    <strong>Sarah Smith</strong><br>
                    <small>sarah@sneakerlab.com</small>
                </div>
                <span class="role-tag role-staff">Orders Only</span>
                <button style="border:none; color: #6d7175;">Edit Permissions</button>
            </div>
        </div>
    </main>
</body>
</html>
