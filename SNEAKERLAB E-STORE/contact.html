<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sneaker Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #000000;
        }

        /* 1. Input Styling - The "Pro" Look */
        .contact-input {
            width: 100%;
            background-color: #f9f9f9;
            border: 1px solid #eeeeee;
            padding: 16px 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            outline: none;
            transition: all 0.3s ease;
        }

        .contact-input:focus {
            background-color: #ffffff;
            border-color: #000000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* 2. Layout Structure */
        .page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .contact-header {
            font-weight: 900;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        /* 3. Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fadeIn 0.6s ease forwards; }

        @media (max-width: 768px) {
            .page-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <main class="page-container">
        <div class="animate-up">
            <nav class="mb-12">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-zinc-400 hover:text-black transition-colors flex items-center">
                    <i class="fa-solid fa-arrow-left mr-2 text-[8px]"></i> Back to Shopping
                </a>
            </nav>

            <header class="mb-20">
                <p class="text-red-600 font-black uppercase tracking-[0.3em] text-[10px] mb-3">Get in Touch</p>
                <h1 class="contact-header text-4xl md:text-6xl leading-tight tracking-tighter">
                    Connect With <br> US
                </h1>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                

                    <div>
                        <h4 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-400 mb-6">Direct Support</h4>
                        <p class="font-bold text-sm uppercase mb-2">support@sneakerlab.co.zw</p>
                        <p class="font-bold text-sm uppercase">+263 770 000 000</p>
                    </div>

                    <div>
                        <h4 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-400 mb-6">Hours</h4>
                        <p class="font-bold text-xs uppercase text-zinc-500">Mon — Fri: 08:00 - 16:00</p>
                        <p class="font-bold text-xs uppercase text-zinc-500">Sat: 10:00 - 14:00</p>
                    </div>
                </div>

                <div class="bg-white">
                    <form id="contact-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" placeholder="Full Name" class="contact-input" required>
                            <input type="email" placeholder="Email Address" class="contact-input" required>
                        </div>
                        
                        <div class="relative">
                            <select class="contact-input appearance-none pr-10">
                                <option>General Inquiry</option>
                                <option>Order Status</option>
                                <option>Authentication Question</option>
                                <option>Returns/Exchanges</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-[10px] pointer-events-none"></i>
                        </div>

                        <textarea placeholder="Your Message" rows="5" class="contact-input resize-none" required></textarea>

                        <button type="submit" class="w-full bg-black text-white py-5 text-[11px] font-black uppercase tracking-[0.2em] hover:bg-red-600 transition-all active:scale-[0.98]">
                            Send Message
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
