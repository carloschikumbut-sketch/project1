<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SNEAKERLAB</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Auth Page Styles */
        body {
            background: var(--gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }

        .auth-container {
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 380px;
            width: 100%;
            padding: 40px 30px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .auth-box {
            width: 100%;
        }

        .auth-box h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: var(--black);
            text-align: center;
        }

        .auth-box > p {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--black);
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            color: #999;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .toggle-password:hover {
            color: var(--black);
        }

        .forgot-pass {
            text-align: right;
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            transition: 0.3s;
        }

        .forgot-pass:hover {
            color: var(--black);
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 10px;
            background: var(--black);
            color: var(--white);
            border: 2px solid var(--black);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .auth-btn:hover {
            background: transparent;
            color: var(--black);
        }

        .divider-text {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider-text::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }

        .divider-text span {
            background: var(--white);
            padding: 0 12px;
            color: #999;
            position: relative;
            font-size: 0.75rem;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .social-btn {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: var(--white);
            color: var(--black);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-transform: uppercase;
        }

        .social-btn:hover {
            border-color: var(--black);
            background: var(--gray);
        }

        .error-message {
            color: var(--accent);
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            padding: 8px;
            background: rgba(255, 77, 77, 0.1);
            border-radius: 4px;
        }

        .error-message.show {
            display: block;
        }

        .signup-link {
            text-align: center;
            color: #666;
            font-size: 0.78rem;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .signup-link button,
        .login-link button {
            background: none;
            border: none;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            padding: 0;
            font-size: 0.78rem;
        }

        .signup-link button:hover,
        .login-link button:hover {
            color: var(--black);
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
            color: #666;
            font-size: 0.78rem;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- LOGIN FORM -->
        <section class="auth-box login-side" id="login-section">
            <h2>Welcome Back</h2>
            <p>Access your sneaker vault.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="email@example.com" required>
                </div>
                <div class="input-group password-container">
                    <label>Password</label>
                    <input type="password" id="login-password" class="password-field" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye toggle-password"></i>
                </div>
                <p id="login-error" class="error-message">INVALID EMAIL OR PASSWORD. PLEASE TRY AGAIN.</p>
                <button type="submit" class="auth-btn">Login</button>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </form>

            <div class="divider-text"><span>OR CONTINUE WITH</span></div>

            <div class="social-auth">
                <button type="button" class="social-btn google">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button type="button" class="social-btn apple">
                    <i class="fa-brands fa-apple"></i> Apple
                </button>
            </div>

            <p class="signup-link">
                Don't have an account? <button type="button" onclick="toggleForms()">Sign up here</button>
            </p>
        </section>

        <!-- SIGNUP FORM -->
        <section class="auth-box signup-side hidden" id="signup-section">
            <h2>Join the Club</h2>
            <p>Create your sneaker collection.</p>
            
            <form id="signup-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="email@example.com" required>
                </div>
                <div class="input-group password-container">
                    <label>Password</label>
                    <input type="password" id="signup-password" class="password-field" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye toggle-password"></i>
                </div>
                <div class="input-group password-container">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" class="password-field" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye toggle-password"></i>
                </div>
                <p id="signup-error" class="error-message">PLEASE CHECK YOUR INFORMATION AND TRY AGAIN.</p>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>

            <div class="divider-text"><span>OR CONTINUE WITH</span></div>

            <div class="social-auth">
                <button type="button" class="social-btn google">
                    <i class="fa-brands fa-google"></i> Google
                </button>
                <button type="button" class="social-btn apple">
                    <i class="fa-brands fa-apple"></i> Apple
                </button>
            </div>

            <p class="login-link">
                Already have an account? <button type="button" onclick="toggleForms()">Login here</button>
            </p>
        </section>
    </div>

    <script>
        // Toggle between login and signup forms
        function toggleForms() {
            const loginSection = document.getElementById('login-section');
            const signupSection = document.getElementById('signup-section');
            
            if (loginSection && signupSection) {
                loginSection.classList.toggle('hidden');
                signupSection.classList.toggle('hidden');
                window.scrollTo(0, 0);
            }
        }

        // Initialize password visibility toggle for all password fields
        function setupPasswordToggle() {
            document.querySelectorAll('.toggle-password').forEach(toggle => {
                // Remove any existing listeners by cloning the element
                const newToggle = toggle.cloneNode(true);
                toggle.parentElement.replaceChild(newToggle, toggle);

                newToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    const passwordField = this.parentElement.querySelector('.password-field');
                    if (passwordField) {
                        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                        passwordField.setAttribute('type', type);
                        this.classList.toggle('fa-eye');
                        this.classList.toggle('fa-eye-slash');
                    }
                });
            });
        }

        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            setupPasswordToggle();

            // Login form handler
            const loginForm = document.getElementById('login-form');
            const loginError = document.getElementById('login-error');

            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    const password = document.getElementById('login-password').value;

                    if (email && password) {
                        alert('Login successful! Redirecting...');
                        if (loginError) loginError.classList.remove('show');
                        // window.location.href = 'index.html';
                    } else {
                        if (loginError) loginError.classList.add('show');
                    }
                });
            }

            // Signup form handler
            const signupForm = document.getElementById('signup-form');
            const signupError = document.getElementById('signup-error');

            if (signupForm) {
                signupForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('signup-name').value;
                    const email = document.getElementById('signup-email').value;
                    const password = document.getElementById('signup-password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;

                    if (name && email && password && confirmPassword) {
                        if (password !== confirmPassword) {
                            if (signupError) {
                                signupError.textContent = 'PASSWORDS DO NOT MATCH. PLEASE TRY AGAIN.';
                                signupError.classList.add('show');
                            }
                        } else {
                            alert('Account created successfully! Please log in.');
                            if (signupError) signupError.classList.remove('show');
                            toggleForms();
                            signupForm.reset();
                            // window.location.href = 'index.html';
                        }
                    } else {
                        if (signupError) signupError.classList.add('show');
                    }
                });
            }
        });
    </script>
</body>
</html>
