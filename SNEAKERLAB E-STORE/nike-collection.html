    .font-display { font-family: 'Bebas Neue', sans-serif; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-15deg); }
      50% { transform: translateY(-20px) rotate(-15deg); }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 53, 0.4); }
      50% { box-shadow: 0 0 40px rgba(255, 107, 53, 0.7); }
    }
    
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-slide-up { animation: slideUp 0.8s ease-out forwards; }
    .animate-slide-right { animation: slideRight 0.8s ease-out forwards; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    
    .sneaker-shadow {
      filter: drop-shadow(0 25px 50px rgba(0, 0, 0, 0.5));
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

  <script>
    const defaultConfig = {
      background_color: '#0D0D0D',
      surface_color: '#FFFFFF',
      text_color: '#A0A0A0',
      primary_action_color: '#FF6B35',
      headline_color: '#FFFFFF',
      headline: 'STEP INTO<br><span class="gradient-text">GREATNESS</span>',
      subheadline: 'Engineered for performance. Designed for style. The future of footwear is here.',
      button_text: 'Shop Now',
      product_name: 'Air Max 2024',
      product_price: '$189',
      font_family: 'Inter',
      font_size: 16
    };

    async function onConfigChange(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const headlineColor = config.headline_color || defaultConfig.headline_color;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      // Background
      document.getElementById('hero-section').style.background = bg;

      // Text colors
      document.querySelectorAll('[style*="color: #A0A0A0"]').forEach(el => {
        el.style.color = text;
      });

      // Headline
      const headline = document.getElementById('headline');
      headline.innerHTML = config.headline || defaultConfig.headline;
      headline.style.color = headlineColor;

      // Subheadline
      const subheadline = document.getElementById('subheadline');
      subheadline.textContent = config.subheadline || defaultConfig.subheadline;
      subheadline.style.color = text;
      subheadline.style.fontSize = `${fontSize * 1.125}px`;

      // CTA Button
      const ctaButton = document.getElementById('cta-button');
      ctaButton.querySelector('span').textContent = config.button_text || defaultConfig.button_text;
      ctaButton.style.background = primary;

      // Product info
      document.getElementById('product-name').textContent = config.product_name || defaultConfig.product_name;
      document.getElementById('product-price').textContent = config.product_price || defaultConfig.product_price;
      document.getElementById('product-price').style.color = primary;

      // Font family
      document.body.style.fontFamily = `${fontFamily}, Inter, sans-serif`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => { config.surface_color = value; window.elementSdk.setConfig({ surface_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.primary_action_color || defaultConfig.primary_action_color,
            set: (value) => { config.primary_action_color = value; window.elementSdk.setConfig({ primary_action_color: value }); }
          },
          {
            get: () => config.headline_color || defaultConfig.headline_color,
            set: (value) => { config.headline_color = value; window.elementSdk.setConfig({ headline_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['headline', (config.headline || defaultConfig.headline).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim()],
        ['subheadline', config.subheadline || defaultConfig.subheadline],
        ['button_text', config.button_text || defaultConfig.button_text],
        ['product_name', config.product_name || defaultConfig.product_name],
        ['product_price', config.product_price || defaultConfig.product_price]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
